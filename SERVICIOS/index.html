<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Servicios de alta relojería CHRONOS con precisión artesanal y acabados premium"
    />
    <script>
      if (location.protocol !== "file:" && /\/SERVICIOS$/i.test(location.pathname)) {
        location.replace(`${location.pathname}/${location.search}${location.hash}`)
      }
    </script>
    <title>Servicios de Relojería | CHRONOS</title>
    <link rel="stylesheet" href="../shared/ui-patterns.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page" id="contenido">
      <section class="services-section" aria-labelledby="services-heading">
        <div class="container">
          <div class="utility-row">
            <div class="account-menu" id="accountMenu" hidden>
              <button
                class="utility-link utility-button"
                type="button"
                id="accountToggle"
                aria-expanded="false"
                aria-controls="accountPanel"
              >
                Mi cuenta
              </button>

              <div class="account-panel" id="accountPanel" hidden>
                <p class="account-label">Sesión activa</p>
                <strong class="account-name" id="authStatus"></strong>
                <a class="account-link" href="../INICIO/index.html">Mi acceso</a>
                <button class="account-logout" type="button" id="logoutButton">Cerrar sesión</button>
              </div>
            </div>
            <a class="utility-link" href="../TIENDA/index.html">Volver a la tienda</a>
          </div>

          <header class="hero">
            <p class="eyebrow">Taller especializado CHRONOS</p>
            <h1 id="services-heading">Servicios de Alta Relojería</h1>
            <p class="hero-copy">
              Cuidado experto para relojes clásicos y contemporáneos, con diagnóstico preciso y terminaciones de nivel boutique.
            </p>
          </header>

          <ul class="services-grid" id="services-grid" role="list"></ul>
        </div>
      </section>
    </main>

    <script src="../shared/auth-session.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
